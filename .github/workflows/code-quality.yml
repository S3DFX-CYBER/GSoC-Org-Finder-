name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (JS + CSS + HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2 
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Lint JavaScript
        run: npm run lint:js
      - name: Lint CSS
        run: npm run lint:css
      - name: Lint HTML
        run: npm run lint:html
