name: 🛡️ Detect AI Slop PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: anti-slop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - name: Run Anti Slop Detection
        uses: peakoss/anti-slop@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Sensitivity
          max-failures: 5

          # PR Requirements
          require-description: true
          require-linked-issue: true
          require-pr-template: true
          require-maintainer-can-modify: true

          # Title & Commits
          require-conventional-title: true
          require-conventional-commits: false

          # Size Limits (Good for GSSOC)
          max-changed-files: 35
          max-changed-lines: 4000
          max-description-length: 2000
          max-commit-message-length: 300

          # AI / Slop Detection
          max-emoji-count: 5
          max-code-references: 12
          detect-spam-usernames: true
          min-account-age: 5

          # Blocked Terms (Customized for GSSOC)
          blocked-terms: |
            generated by chatgpt
            generated with chatgpt
            this pr was automatically generated
            fully generated by ai
            auto generated pull request
            prompt used
            here is the prompt
            as an ai language model
            i cannot access external systems
            chatgpt said
            created entirely using ai
            no manual changes were made
            i used grok to
            claude generated
            gemini wrote

          # Template Enforcement
          strict-pr-template-sections: |
            checklist
            description

          # Blocked Branches
          blocked-source-branches: |
            main
            master
            develop

          # Exemptions
          exempt-author-association: |
            OWNER
            MEMBER
            COLLABORATOR
          exempt-bots: |
            github-actions[bot]
            dependabot[bot]

          # Failure Actions
          failure-add-pr-labels: |
            ai-slop
            low-quality-pr
          failure-pr-message: |
            ## 🚫 PR Flagged by Quality Guard

            This PR has been automatically flagged due to quality issues.

            **Common reasons:**
            - Missing linked issue (`Closes #xxx`)
            - Not following the PR template
            - AI-generated / low-effort content detected
            - Too large or unfocused changes

            Please fix the issues and push new commits. Maintainers will review the flag.

          close-pr: false        # Better to keep open during GSSOC
          lock-pr: false
