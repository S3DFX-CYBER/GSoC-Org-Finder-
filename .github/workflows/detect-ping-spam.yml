name: 🔕 Ping Spam Guard

on:
  issue_comment:
    types:
      - created

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ping-spam-${{ github.event.issue.number }}-${{ github.event.comment.user.login }}
  cancel-in-progress: true

jobs:
  detect-ping-spam:
    name: Detect Maintainer Ping Spam
    runs-on: ubuntu-latest

    if: |
      github.actor != 'github-actions[bot]'

    steps:
      - name: Analyze Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;

            const issue_number = issue.number;
            const username = sender.login;

            const body = (comment.body || '').toLowerCase().trim();

            if (
              sender.type === 'Bot' ||
              username.endsWith('[bot]')
            ) {
              core.info('Skipping bot comment');
              return;
            }

            const association = comment.author_association || '';

            if (
              ['OWNER', 'MEMBER', 'COLLABORATOR']
                .includes(association)
            ) {
              core.info('Skipping maintainer comment');
              return;
            }

            if (
              /^(\/assign|\/unassign)(\s+(gssoc|nsoc))?$/i
                .test(body)
            ) {
              core.info('Valid assignment command');
              return;
            }

            const spamPatterns = [
              'assign me',
              'pls assign',
              'plz assign',
              'please assign',
              'merge pls',
              'review pls',
              'kindly assign',
              'urgent review',
              'hello maintainer',
              'any updates',
              'still waiting',
              'bump'
            ];

            const matched = spamPatterns.some(pattern =>
              body.includes(pattern)
            );

            if (!matched) {
              core.info('No spam pattern detected');
              return;
            }

            const WARNING_MARKER =
              '<!-- ping-spam-warning -->';

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 50
              }
            );

            const existingWarning = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(WARNING_MARKER) &&
              c.body.includes(`@${username}`)
            );

            const spamCount = comments.filter(c =>
              c.user.login === username &&
              spamPatterns.some(p =>
                (c.body || '').toLowerCase().includes(p)
              )
            ).length;

            core.info(
              `Spam count for @${username}: ${spamCount}`
            );

            if (spamCount >= 3) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['needs-moderation']
                });
              } catch (e) {
                core.warning(
                  `Failed adding label: ${e.message}`
                );
              }
            }

            if (existingWarning) {
              core.info('Warning already exists');
              return;
            }

            const warning =
              `${WARNING_MARKER}\n` +
              `## ⚠️ Please Avoid Repeated Maintainer Pings\n\n` +
              `Hi @${username},\n\n` +
              `Maintainers review issues and PRs in queue order.\n\n` +
              `Repeated requests for assignment, review, or merge priority may slow moderation for everyone.\n\n` +
              `Typical response times:\n` +
              `- Assignment: 12–24 hours\n` +
              `- Review: 24–72 hours\n\n` +
              `Thank you for your patience and contribution `;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: warning
            });

            core.info('Posted warning comment');
