name: 🔁 Duplicate Issue Detector

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  contents: read

concurrency:
  group: duplicate-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate:
    runs-on: ubuntu-latest
    steps:
      - name: Detect duplicate issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const title = (issue.title || '').trim();

            if (issue.user.type === 'Bot') return;

            const labels = (issue.labels || []).map(l => l.name.toLowerCase());
            if (labels.includes('research')) return;

            if (title.length < 8) return;

            const normalize = str =>
              str.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();

            const tokenize = str => {
              const words = normalize(str).split(' ');
              return new Set(words.filter(w => w.length > 2));
            };

            const similarity = (setA, setB) => {
              if (setA.size === 0 || setB.size === 0) return 0;
              let intersection = 0;
              for (const word of setA) {
                if (setB.has(word)) intersection++;
              }
              return intersection / Math.max(setA.size, setB.size);
            };

            const stripTemplateBoilerplate = str => {
              return str
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/^#{1,3}\s.*$/gm, '')
                .replace(/^---$/gm, '')
                .replace(/^- \[[ x]\].*/gm, '')
                .replace(/\n{2,}/g, '\n')
                .trim();
            };

            const currentTitle = normalize(title);
            const currentTokens = tokenize(title);
            const currentBody = issue.body || '';
            const strippedBody = stripTemplateBoilerplate(currentBody);
            const currentBodyTokens = tokenize(strippedBody);

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            let duplicateIssue = null;
            let matchType = null;

            for (const existing of existingIssues) {
              if (existing.number === issue_number || existing.pull_request) continue;
              if ((existing.labels || []).some(l => l.name.toLowerCase() === 'research')) continue;

              const existingTitle = normalize(existing.title || '');

              if (existingTitle === currentTitle) {
                duplicateIssue = existing;
                matchType = 'exact title';
                break;
              }

              const existingTokens = tokenize(existing.title || '');
              const titleSim = similarity(currentTokens, existingTokens);

              if (titleSim >= 0.8) {
                duplicateIssue = existing;
                matchType = 'similar title';
                break;
              }

              if (titleSim >= 0.5 && currentBodyTokens.size > 5) {
                const existingBody = existing.body || '';
                const existingStripped = stripTemplateBoilerplate(existingBody);
                const existingBodyTokens = tokenize(existingStripped);
                const bodySim = similarity(currentBodyTokens, existingBodyTokens);

                if (bodySim >= 0.7) {
                  duplicateIssue = existing;
                  matchType = 'similar content';
                  break;
                }
              }
            }

            if (duplicateIssue) {
              const marker = '<!-- duplicate-detector -->';

              const matchDescription = {
                'exact title': 'exact title match',
                'similar title': 'very similar title',
                'similar content': 'very similar content'
              }[matchType] || matchType;

              const bodyText = marker + '\n' +
                `## 🔁 Duplicate Issue Detected\n\n` +
                `Hi @${username}, this issue appears to be a duplicate of:\n\n` +
                `➡️ #${duplicateIssue.number} (${matchDescription})\n\n` +
                `Closing as duplicate. If this is **not** a duplicate, please reopen and explain the difference.`;

              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
              });

              const existingComment = comments.find(c => c.body && c.body.includes(marker));

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existingComment.id, body: bodyText
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number, body: bodyText
                });
              }

              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels: ['duplicate']
              }).catch(() => {});

              await github.rest.issues.update({
                owner, repo, issue_number,
                state: 'closed',
                state_reason: 'not_planned'
              });

              core.info(`Closed #${issue_number} as duplicate of #${duplicateIssue.number}`);
            }
