name: 🔁 Duplicate PR Detector

on:
  pull_request_target:
    types: [opened, edited]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  detect-duplicate:
    name: Detect Duplicate PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Analyze PR
        uses: actions/github-script@v7
        with:
          script: |
            if (context.actor === 'github-actions[bot]') return;
            const { stringSimilarity, updateStickyComment, syncLabels } = require('./.github/scripts/common-utils.js');
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;
            const username = pr.user.login;

            if (pr.user.type === 'Bot' || username.endsWith('[bot]')) {
              return;
            }

            const title = (pr.title || '').trim();
            if (title.length < 10) return;

            const pull_requests = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', sort: 'created', direction: 'desc', per_page: 50 }
            );

            let duplicate = null;
            let highestSimilarity = 0;

            for (const existing of pull_requests) {
              if (existing.number === issue_number) continue;

              const sim = stringSimilarity(existing.title || '', title);
              if (sim > highestSimilarity) {
                highestSimilarity = sim;
                if (sim >= 0.6) {
                  duplicate = existing;
                }
              }
            }

            if (!duplicate) {
              core.info(`No duplicate detected. Highest similarity was ${highestSimilarity.toFixed(2)}`);
              return;
            }

            const marker = '<!-- pr-duplicate-detector -->';
            const newBody = [
              `## 🔁 Possible Duplicate PR`, '',
              `Hi @${username}, this PR appears similar to an existing one:`, '',
              `➡️ #${duplicate.number} (Similarity: ${(highestSimilarity * 100).toFixed(0)}%)`, '',
              `Please review the existing PR before continuing.`, '',
              `If your changes are substantially different, feel free to clarify the distinction.`
            ].join('\n');

            await updateStickyComment({ github, owner, repo, issue_number, marker, newBody });
            await syncLabels({ github, owner, repo, issue_number, add: ['possible-duplicate'] });
