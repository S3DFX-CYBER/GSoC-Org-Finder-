name: 🧭 Issue Assignment

on:
  issue_comment:
    types:
      - created

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: smart-issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  handle-assignment:
    name: Handle Assignment Requests
    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Process Assignment Commands
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const { selectActiveMentors } = require('./.github/scripts/select-active-mentors');

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = sender.login;
            const MAX_ASSIGNMENTS = 3;

            if (sender.type === 'Bot' || username.endsWith('[bot]')) return;

            const mentorsData = JSON.parse(fs.readFileSync('.github/reviewers/gssoc-mentors.json', 'utf8'));
            const mentorStats = JSON.parse(fs.readFileSync('.github/reviewers/mentor-stats.json', 'utf8'));
            const mentorSet = new Set((mentorsData.reviewers || []).map(x => x.toLowerCase()));

            const body = (comment.body || '').trim().toLowerCase();
            const wantsAssign = /^\/assign(\s+(gssoc|nsoc))?$/.test(body);
            const wantsUnassign = /^\/unassign$/.test(body);
            const approveMatch = (comment.body || '').match(/^\/approve-assignment\s+@([a-zA-Z0-9-]+)$/i);
            const wantsApprove = !!approveMatch;
            if (!wantsAssign && !wantsUnassign && !wantsApprove) return;

            const { data: currentIssue } = await github.rest.issues.get({ owner, repo, issue_number });
            if (currentIssue.state !== 'open' || currentIssue.locked) {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: '⚠️ This issue is closed or locked, so assignment actions are disabled.' });
              return;
            }
            const labels = (currentIssue.labels || []).map(l => l.name.toLowerCase());
            const isValidated = !labels.includes('needs-triage') && !labels.includes('needs-quality');

            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({ owner, repo, username });
            const isMaintainer = ['admin', 'maintain', 'write'].includes(permission.permission);
            const isMentor = mentorSet.has(username.toLowerCase());
            const canApprove = isMaintainer || isMentor;

            if (wantsUnassign) {
              const isAssigned = (currentIssue.assignees || []).some(a => a.login.toLowerCase() === username.toLowerCase());
              if (!isAssigned) {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `❌ @${username}, you are not assigned to this issue.` });
                return;
              }
              await github.rest.issues.removeAssignees({ owner, repo, issue_number, assignees: [username] });
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'assigned' }).catch(() => {});
              await github.rest.issues.createComment({ owner, repo, issue_number, body: `✅ Unassigned @${username} from this issue.` });
              return;
            }

            if (wantsApprove) {
              if (!canApprove) {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `❌ Only mentors or maintainers can approve assignments.` });
                return;
              }

              const targetUser = approveMatch[1];
              if ((currentIssue.assignees || []).length > 0) {
                const assigned = currentIssue.assignees.map(a => `@${a.login}`).join(', ');
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `⚠️ This issue is already assigned to ${assigned}.` });
                return;
              }

              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
              const requested = comments.some(c => c.user && c.user.login.toLowerCase() === targetUser.toLowerCase() && /^\/assign(\s+(gssoc|nsoc))?$/i.test((c.body || '').trim()));
              if (!requested) {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `❌ @${targetUser} has not requested assignment for this issue.` });
                return;
              }

              const assignedIssues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', assignee: targetUser, per_page: 100 });
              const activeIssues = assignedIssues.filter(i => !i.pull_request);
              if (activeIssues.length >= MAX_ASSIGNMENTS) {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `❌ @${targetUser} already has ${MAX_ASSIGNMENTS} active assignments.` });
                return;
              }

              const { data: latestIssue } = await github.rest.issues.get({ owner, repo, issue_number });
              if (latestIssue.state !== 'open' || latestIssue.locked) {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `⚠️ This issue was closed or locked before approval could complete.` });
                return;
              }
              if ((latestIssue.assignees || []).length > 0) {
                const assignedNow = latestIssue.assignees.map(a => `@${a.login}`).join(', ');
                await github.rest.issues.createComment({ owner, repo, issue_number, body: `⚠️ This issue was already assigned to ${assignedNow} before your request could be approved.` });
                return;
              }

              await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees: [targetUser] });
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['assigned'] }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'assignment-requested' }).catch(() => {});

              if (mentorSet.has(username.toLowerCase())) {
                try {
                  execSync('node .github/scripts/update-mentor-stats.js', {
                    stdio: 'pipe',
                    env: { ...process.env, ACTION_TYPE: 'assignment_approval', REVIEWER: username }
                  });
                } catch (e) {
                  core.warning(`Failed to update mentor assignment approval stats: ${e.message}`);
                }
              }

              await github.rest.issues.createComment({ owner, repo, issue_number, body: `✅ @${targetUser} has been assigned by @${username}.` });
              return;
            }

            const { data: profile } = await github.rest.users.getByUsername({ username });
            const ageDays = (new Date() - new Date(profile.created_at)) / (1000 * 60 * 60 * 24);
            if (ageDays < 7) {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: `❌ @${username}, your GitHub account must be at least 7 days old to request assignments.` });
              return;
            }

            if ((currentIssue.assignees || []).length > 0) {
              const assigned = currentIssue.assignees.map(a => `@${a.login}`).join(', ');
              await github.rest.issues.createComment({ owner, repo, issue_number, body: `⚠️ This issue is already assigned to ${assigned}.` });
              return;
            }

            const assignedIssues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', assignee: username, per_page: 100 });
            const activeIssues = assignedIssues.filter(i => !i.pull_request);
            if (activeIssues.length >= MAX_ASSIGNMENTS) {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: `❌ @${username}, you already have ${activeIssues.length} active assignments.\n\nMaximum allowed: ${MAX_ASSIGNMENTS}` });
              return;
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['assignment-requested'] }).catch(() => {});

            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const marker = `<!-- mentor-request:${username.toLowerCase()} -->`;
            const recentMentorPings = comments
              .filter(c => c.user?.type === 'Bot' && c.body && c.body.includes('<!-- mentor-request:'))
              .flatMap(c => (c.body.match(/@([a-zA-Z0-9-]+)/g) || []).map(x => x.slice(1)));

            const selectedMentors = selectActiveMentors({
              mentors: mentorsData.reviewers || [],
              stats: mentorStats,
              exclude: [username],
              count: 2,
              recentMentorPings,
              maxOpenAssignments: 10
            });

            let mentions = selectedMentors.map(m => `@${m}`).join(' ');
            let extraNote = '';
            if (!selectedMentors.length) {
              const fallback = (mentorsData.reviewers || []).filter(m => m.toLowerCase() !== username.toLowerCase()).slice(0, 2);
              mentions = fallback.map(m => `@${m}`).join(' ');
              extraNote = '\n⚠️ No highly active mentors were available right now, so fallback routing was used. Review may take longer.';
            }

            const priorMergedPrs = await github.paginate(github.rest.pulls.list, { owner, repo, state: 'closed', per_page: 100 }).then(prs => prs.filter(p => p.user?.login?.toLowerCase() === username.toLowerCase() && p.merged_at).length).catch(() => 0);
            const message = `${marker}\n## 📌 Assignment Request Recorded\n\nHi @${username}, your assignment request has been queued for review.\n\n${isValidated ? '✅ This issue is already validated and awaiting mentor approval.' : '⚠️ This issue still requires validation/triage before assignment.'}\n\n### 👀 Mentor Review Requested\n\n${mentions || 'No mentors currently available for immediate ping.'}${extraNote}\n\n### Contributor Context for Mentors\n- Active assignment count: ${activeIssues.length}/${MAX_ASSIGNMENTS}\n- Prior merged PRs: ${priorMergedPrs}\n- Account age: ${Math.floor(ageDays)} days\n\nPlease use:\n\`/approve-assignment @${username}\``;
            const existing = comments.find(c => c.user?.type === 'Bot' && (c.body || '').includes(marker));
            if (existing) {
              if (existing.body.trim() !== message.trim()) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
              }
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
            }
