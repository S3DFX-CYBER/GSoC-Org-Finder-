name: 🚫 Repeat Low-Quality Issue Closer

on:
  issues:
    types:
      - opened

permissions:
  issues: write

concurrency:
  group: repeat-offender-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check user spam history
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const issue_number = issue.number;
            const username = issue.user.login;

            if (issue.user.type === 'Bot') return;

            const association = issue.author_association || '';
            if (['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association)) return;

            const spamQuery = `repo:${owner}/${repo} author:${username} label:spam is:issue`;
            const invalidQuery = `repo:${owner}/${repo} author:${username} label:invalid is:issue`;

            const [spamResults, invalidResults] = await Promise.all([
              github.rest.search.issuesAndPullRequests({ q: spamQuery, per_page: 100 }),
              github.rest.search.issuesAndPullRequests({ q: invalidQuery, per_page: 100 })
            ]);

            const uniqueBadIssues = new Set([
              ...spamResults.data.items.map(i => i.number),
              ...invalidResults.data.items.map(i => i.number)
            ]);
            const totalBadIssues = uniqueBadIssues.size;
            core.info(`User @${username}: ${spamResults.data.items.length} spam, ${invalidResults.data.items.length} invalid, ${totalBadIssues} unique bad issues`);

            const THRESHOLD = 3;

            if (totalBadIssues < THRESHOLD) return;

            const marker = '<!-- repeat-offender-closer -->';

            const commentBody = [
              marker,
              `## 🚫 Auto-Closed: Repeat Low-Quality Submissions\n`,
              `Hi @${username},\n`,
              `Your account has **${totalBadIssues}** previous issues marked as \`spam\` or \`invalid\` in this repository.\n`,
              `This issue has been automatically closed. If you believe this is a legitimate issue, ` +
              `please contact a maintainer to have it reviewed and reopened.\n`,
              `---`,
              `*To avoid this in the future: use issue templates, provide detailed descriptions, ` +
              `and check for existing issues before opening new ones.*`
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number, body: commentBody
            });

            await github.rest.issues.addLabels({
              owner, repo, issue_number, labels: ['auto-closed']
            }).catch(() => {});

            await github.rest.issues.update({
              owner, repo, issue_number,
              state: 'closed',
              state_reason: 'not_planned'
            });

            core.info(`Auto-closed issue #${issue_number} from repeat offender @${username} (${totalBadIssues} bad issues)`);
