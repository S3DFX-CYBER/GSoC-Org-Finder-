name: 📏 Issue Quality Validator

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

concurrency:
  group: issue-validate-${{ github.event.issue.number }}-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Issue Quality
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Quality Checks
        uses: actions/github-script@v7
        with:
          script: |
            const { updateStickyComment, syncLabels } = require('./.github/scripts/common-utils.js');
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;

            if (issue.user.type === 'Bot' || issue.pull_request) {
              return;
            }

            const association = issue.author_association || '';
            if (['OWNER', 'MEMBER', 'COLLABORATOR'].includes(association)) {
              return;
            }

            const labels = (issue.labels || []).map(l => l.name.toLowerCase());
            if (labels.includes('research') || labels.includes('meta')) {
              return;
            }

            const title = (issue.title || '').trim();
            const body = (issue.body || '').trim();
            const problems = [];

            if (title.length < 10) {
              problems.push('⚠️ Title is too short. Please use a descriptive summary.');
            }

            const normalizedTitle = title.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
            const GENERIC_TITLES = ['bug', 'issue', 'fix', 'help', 'error', 'problem', 'feature', 'request'];

            if (GENERIC_TITLES.includes(normalizedTitle)) {
              problems.push('⚠️ Title is too generic. Please be more specific.');
            }

            const cleanedBody = body.replace(/<!--[\s\S]*?-->/g, '').replace(/[#>*`\-\[\]]/g, '').trim();

            if (cleanedBody.length < 50) {
              problems.push('⚠️ Issue description is too short. Please provide more detail.');
            }

            const likelyTemplate = /reproduce|expected|actual|environment|steps/i.test(body);
            if (!likelyTemplate) {
              problems.push('⚠️ Please provide reproduction steps, expected behavior, or additional context.');
            }

            const marker = '<!-- issue-quality-validator -->';

            if (problems.length === 0) {
              await syncLabels({ github, owner, repo, issue_number, remove: ['needs-quality'] });
              
              const newBody = [
                `## ✅ Issue Quality Check Passed`, '',
                `This issue meets the repository quality standards.`
              ].join('\n');
              
              await updateStickyComment({ github, owner, repo, issue_number, marker, newBody });
              return;
            }

            await syncLabels({ github, owner, repo, issue_number, add: ['needs-quality'] });

            const newBody = [
              `## 📏 Issue Quality Suggestions`, '',
              `Hi @${username}, please improve the following before maintainers review this issue:`, '',
              ...problems.map(p => `- ${p}`), '',
              `---`,
              `*After editing the issue, this check will update automatically.*`
            ].join('\n');

            await updateStickyComment({ github, owner, repo, issue_number, marker, newBody });
