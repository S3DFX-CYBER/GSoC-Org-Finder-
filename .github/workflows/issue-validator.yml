name: 🛡️ Strict Issue Validator

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

concurrency:
  group: strict-issue-validator-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { analyzeIssue } = require('./.github/scripts/validate-issue');
            const issue = context.payload.issue;
            if (issue.pull_request) return;
            const owner = context.repo.owner, repo = context.repo.repo, issue_number = issue.number;
            const marker = '<!-- strict-issue-validator -->';
            const result = analyzeIssue(issue);
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user?.type === 'Bot' && (c.body || '').includes(marker));
            const upsert = async (body) => {
              const final = `${marker}\n${body}`;
              if (existing) { if (existing.body.trim() !== final.trim()) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: final }); }
              else await github.rest.issues.createComment({ owner, repo, issue_number, body: final });
            };

            if (result.spam) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['spam'] }).catch(() => {});
              await upsert('## ❌ Issue closed as spam\n\nThis issue appears to be low-signal/spam. If this is a mistake, add concrete reproduction details and request reopen.');
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
              return;
            }

            if (result.problems.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['needs-more-info'] }).catch(() => {});
              await upsert(`## ℹ️ More information needed\n\nPlease update this issue with:\n${result.problems.map(p => `- ${p}`).join('\n')}\n\nThis issue will remain open for now; maintainers may close it later if no follow-up is provided.`);
              return;
            }

            try { await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'needs-more-info' }); } catch (e) {}
            if (existing) await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id }).catch(() => {});
