name: Mentor Assignment Expiry Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: write

concurrency:
  group: mentor-assignment-expiry
  cancel-in-progress: false

jobs:
  check-expiry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find and escalate expired pending assignments
        id: expired
        run: |
          RESULT=$(node .github/scripts/update-pending-assignments.js)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Expired entries: $RESULT"
        env:
          OPERATION: expire

      - name: Escalate to PA
        uses: actions/github-script@v7
        env:
          EXPIRED_RESULT: ${{ steps.expired.outputs.result }}
        with:
          script: |
            const { updateStickyComment, syncLabels } = require('./.github/scripts/common-utils.js');
            const { owner, repo } = context.repo;
            const marker = '<!-- assignment-status -->';
            
            let expiredList = [];
            try {
              expiredList = JSON.parse(process.env.EXPIRED_RESULT).expired || [];
            } catch {
              core.info('No expired assignments or parse error.');
              return;
            }
            if (!expiredList.length) { core.info('No expired assignments.'); return; }

            for (const entry of expiredList) {
              const { issue_number, claimant } = entry;
              const previousMentors = entry.pinged_mentors || [];
              const prevList = previousMentors.length
                ? previousMentors.map(m => `@${m}`).join(', ')
                : 'the assigned mentors';
                
              await syncLabels({ 
                github, owner, repo, issue_number, 
                add: ['needs-pa-assignment-review'],
                remove: ['assignment-pending'] 
              });

              const newBody = [
                '## 🚨 Assignment Queue — Escalated', '',
                `@${claimant} the 24-hour window for ${prevList} has elapsed.`, '',
                `This issue has been escalated to the maintainer team.`, '',
                `> cc: @S3DFX-CYBER`, '',
                '_A Project Admin will review this manually._'
              ].join('\n');
              
              await updateStickyComment({ github, owner, repo, issue_number, marker, newBody });
              core.info(`Escalated issue #${issue_number} to PA.`);
            }

      - name: Commit updated queue
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]`@users.noreply.github.com`"
          git add .github/reviewers/pending-assignments.json
          git diff --cached --quiet && echo "No queue changes" && exit 0
          git commit -m "chore: mark expired assignments as escalated [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
