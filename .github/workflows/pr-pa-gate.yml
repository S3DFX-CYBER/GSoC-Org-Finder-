name: 🔑 PA / Maintainer Final Gate

on:
  pull_request_review:
    types:
      - submitted
      - dismissed
  pull_request_target:
    types:
      - labeled
      - unlabeled
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pa-final-gate-${{ github.event.pull_request.number || github.event.review.pull_request_number }}
  cancel-in-progress: true

jobs:
  pa-gate:
    name: PA Final Gate
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft

    steps:
      - name: Evaluate PA Approval State
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request || 
                       (context.payload.review && context.payload.review.pull_request);
            
            if (!pr) {
              core.info('No PR context found.');
              return;
            }

            const prNumber = pr.number;
            const labels = (pr.labels || []).map(l => l.name);

            const hasLabel = (name) => labels.includes(name);

            const stage1Complete = hasLabel('stage-1-approved');
            const stage2Complete = hasLabel('mentor-approved') || 
                                  hasLabel('review-approved') ||
                                  hasLabel('gssoc-mentor-approved') ||
                                  hasLabel('nsoc-reviewed');

            // Helper functions
            async function addLabel(label) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: [label]
                });
              } catch (e) { core.warning(`Failed adding label '${label}': ${e?.message || e}`); }
            }

            async function removeLabel(label) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label
                });
              } catch (e) { core.info(`Label '${label}' may not exist`); }
            }

            // Fetch all reviews
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: prNumber }
            );

            // Find latest review per user
            const latestReviews = new Map();
            for (const review of reviews) {
              latestReviews.set(review.user.login.toLowerCase(), review);
            }

            // Check for valid maintainer approval
            let maintainerApproved = false;

            for (const [, review] of latestReviews) {
              if (review.state !== 'APPROVED') continue;
              
              // Prevent self-approval
              if (review.user.login.toLowerCase() === pr.user.login.toLowerCase()) continue;

              try {
                const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: review.user.login
                });

                if (['admin', 'maintain', 'write'].includes(permission.permission)) {
                  maintainerApproved = true;
                  core.info(`Valid maintainer approval from @${review.user.login}`);
                  break;
                }
              } catch (err) {
                core.warning(`Permission check failed for @${review.user.login}: ${err?.message || err}`);
              }
            }

            if (!maintainerApproved) {
              core.info('No valid PA/Maintainer approval yet.');
              await removeLabel('pa-review');
              await removeLabel('merge-ready');
              return;
            }

            // Maintainer has approved
            await addLabel('pa-review');

            // Final merge-ready check
            if (stage1Complete && stage2Complete) {
              core.info('All stages passed → PR is merge-ready');
              await addLabel('merge-ready');
            } else {
              await removeLabel('merge-ready');
            }

            // Cleanup
            if (hasLabel('merge-ready') && hasLabel('needs-stage-1-fixes')) {
              await removeLabel('needs-stage-1-fixes');
            }
