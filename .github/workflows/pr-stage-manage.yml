name: "PR Stage Manager"

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

  pull_request_review:
    types:
      - submitted

permissions:
  pull-requests: write
  issues: write
  contents: read
  metadata: write

concurrency:
  group: pr-stage-manager-${{ github.event.pull_request.number || github.event.review.pull_request.number }}
  cancel-in-progress: true

jobs:
  stage-manager:
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate PR Pipeline
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber =
              context.payload.pull_request?.number ||
              context.payload.review?.pull_request_url?.split('/').pop();

            if (!prNumber) {
              core.setFailed('Unable to determine PR number');
              return;
            }

            if (
              context.payload.action &&
              ['opened', 'synchronize'].includes(context.payload.action)
            ) {
              await new Promise(r => setTimeout(r, 15000));
            }

            const { data: labelData } =
              await github.rest.issues.listLabelsOnIssue({
                owner,
                repo,
                issue_number: Number(prNumber)
              });

            const labels = labelData.map(l => l.name.toLowerCase());

            const isGSSOC = labels.includes('gssoc26');
            const isNSOC = labels.includes('nsoc26');

            const dcoVerified = labels.includes('dco-verified');
            const dcoMissing = labels.includes('dco-missing');
            const aiSlop =
              labels.includes('ai-slop') ||
              labels.includes('gssoc:ai-slop');
            const duplicatePR = labels.includes('possible-duplicate-pr');
            const gssocSpam = labels.includes('gssoc:spam');
            const gssocInvalid = labels.includes('gssoc:invalid');

            const stage1Passed =
              dcoVerified &&
              !dcoMissing &&
              !aiSlop &&
              !gssocSpam &&
              !gssocInvalid;

            const mentorApproved =
              labels.includes('gssoc-mentor-approved') ||
              labels.includes('mentor-approved');
            const reviewerApproved = labels.includes('review-approved');

            const stage2Passed = isNSOC
              ? stage1Passed
              : isGSSOC
                ? mentorApproved
                : mentorApproved || reviewerApproved;

            const gssocApproved = labels.includes('gssoc:approved');
            const paApproved = labels.includes('pa-approved') || gssocApproved;
            const mergeReady = labels.includes('merge-ready');

            async function addLabel(name) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: Number(prNumber),
                  labels: [name]
                });

                core.info(`Added label: ${name}`);
              } catch (e) {
                core.warning(`Failed adding label '${name}': ${e.message}`);
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: Number(prNumber),
                  name
                });

                core.info(`Removed label: ${name}`);
              } catch (_) {}
            }

            if (stage1Passed) {
              await addLabel('stage-1-approved');
              await removeLabel('needs-stage-1-fixes');

              if (!mentorApproved && !reviewerApproved && isGSSOC) {
                await addLabel('needs-mentor-review');
                await addLabel('mentor-review-requested');
              }
            } else {
              await removeLabel('stage-1-approved');
              await addLabel('needs-stage-1-fixes');
              await removeLabel('needs-mentor-review');
              await removeLabel('mentor-review-requested');
            }

            let s1Icon = '[pending]';
            let s1Text = 'Waiting for automated checks';

            if (stage1Passed) {
              s1Icon = '[ok]';
              s1Text = 'All automated checks passed';
            } else if (dcoMissing || aiSlop || gssocSpam || gssocInvalid) {
              s1Icon = '[fail]';
              s1Text = 'Failed - fixes required';
            }

            let s2Icon = '[locked]';
            let s2Text = 'Blocked until Stage 1 passes';

            if (stage1Passed) {
              if (isNSOC) {
                s2Icon = '[ok]';
                s2Text = 'NSOC bypasses mentor review';
              } else {
                s2Icon = '[pending]';
                s2Text = isGSSOC
                  ? 'Awaiting GSSOC mentor review'
                  : 'Awaiting reviewer approval';

                if (stage2Passed) {
                  s2Icon = '[ok]';
                  s2Text = isGSSOC
                    ? 'Mentor approved'
                    : 'Reviewer approved';
                }
              }
            }

            let s3Icon = '[locked]';
            let s3Text = 'Blocked until Stage 2 passes';

            if (stage1Passed && stage2Passed) {
              s3Icon = '[pending]';
              s3Text = 'Awaiting maintainer review';

              if (paApproved || mergeReady) {
                s3Icon = '[ok]';
                s3Text = 'Ready to merge';
              }
            }

            const details = [];

            if (!dcoVerified) details.push('DCO verification pending');
            if (dcoMissing) details.push('DCO sign-off missing');
            if (aiSlop) details.push('AI/slop detection triggered');
            if (duplicatePR) details.push('Possible duplicate PR');
            if (gssocSpam) details.push('Marked as GSSOC spam');
            if (gssocInvalid) details.push('Marked as GSSOC invalid');

            const typeBadge = isGSSOC
              ? '> [GSSOC PR]'
              : isNSOC
                ? '> [NSOC PR]'
                : '> [Standard PR]';

            const marker = '<!-- pr-stage-manager -->';

            let body = marker + '\n';
            body += '## PR Review Pipeline\n';
            body += typeBadge + '\n\n';
            body += '| Stage | Status |\n';
            body += '|-------|--------|\n';
            body += `| **Stage 1 - Automated Checks** | ${s1Icon} ${s1Text} |\n`;
            body += `| **Stage 2 - Mentor/Reviewer** | ${s2Icon} ${s2Text} |\n`;
            body += `| **Stage 3 - Maintainer** | ${s3Icon} ${s3Text} |\n\n`;

            if (details.length > 0) {
              body += details.map(d => `> - ${d}`).join('\n');
              body += '\n\n';
            } else {
              body += '> No active issues\n\n';
            }

            body += '---\n';
            body += `**Last updated:** ${new Date().toUTCString()}`;

            const { data: comments } =
              await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: Number(prNumber),
                per_page: 100
              });

            const existing = comments.find(comment =>
              comment.body &&
              comment.body.includes(marker)
            );

            if (existing) {
              const oldContent = existing.body
                .replace(/\*\*Last updated:\*\*.*$/, '')
                .trim();

              const newContent = body
                .replace(/\*\*Last updated:\*\*.*$/, '')
                .trim();

              if (oldContent === newContent) {
                core.info('Pipeline state unchanged');
                return;
              }

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });

              core.info('Updated pipeline comment');
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: Number(prNumber),
                body
              });

              core.info('Created pipeline comment');
            }

