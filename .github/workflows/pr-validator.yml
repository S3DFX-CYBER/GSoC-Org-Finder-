name: 🔒 PR Validator

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-validator-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { extractIssueRefs, calcQuality } = require('./.github/scripts/validate-pr');
            const pr = context.payload.pull_request;
            const owner = context.repo.owner, repo = context.repo.repo;
            const prNumber = pr.number;
            const marker = '<!-- pr-validator -->';

            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber, per_page: 100 });
            const existing = comments.find(x => x.user?.type === 'Bot' && (x.body || '').includes(marker));
            const upsert = async (body) => {
              const final = `${marker}\n${body}`;
              if (existing) {
                if (existing.body.trim() !== final.trim()) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: final });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: final });
              }
            };

            const refs = extractIssueRefs(pr.body || '');
            const assoc = pr.author_association || '';
            const privileged = ['OWNER','MEMBER','COLLABORATOR'].includes(assoc);
            const { data: files } = await github.rest.pulls.listFiles({ owner, repo, pull_number: prNumber, per_page: 100 });
            const quality = calcQuality(pr, files);

            if (!refs.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['invalid-pr'] }).catch(() => {});
              if (quality.score >= 5) {
                await upsert('## ⚠️ We need one fix before review\n\nPlease link a valid issue using `Closes #123` (or `Fixes/Resolves`). This PR also looks out-of-scope, so maintainers were notified.');
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['needs-human-review'] }).catch(() => {});
                await github.rest.pulls.update({ owner, repo, pull_number: prNumber, state: 'closed' });
              } else {
                await upsert('## ℹ️ Please link an issue\n\nAdd `Closes #123` (or `Fixes/Resolves`) in the PR body, then push any update. We will re-check automatically.');
              }
              return;
            }

            const issueNumber = refs[0];
            const { data: linkedIssue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber }).catch(() => ({ data: null }));
            if (!linkedIssue) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['invalid-pr'] }).catch(() => {});
              await upsert(`## ℹ️ Linked issue not found\n\nWe could not find #${issueNumber}. Please update to a valid issue reference and we will re-check.`);
              return;
            }

            const issueLabels = (linkedIssue.labels || []).map(l => (l.name || '').toLowerCase());
            if (linkedIssue.state !== 'open' || linkedIssue.locked || issueLabels.includes('spam') || issueLabels.includes('invalid')) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['issue-mismatch', 'needs-human-review'] }).catch(() => {});
              await upsert(`## ⚠️ Linked issue needs attention\n\nIssue #${issueNumber} is closed/locked/invalid, so this PR needs maintainer review before proceeding.`);
              return;
            }

            const assignees = (linkedIssue.assignees || []).map(a => a.login.toLowerCase());
            const author = (pr.user.login || '').toLowerCase();
            if (assignees.length && !assignees.includes(author) && !privileged) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['unauthorized-contribution', 'needs-human-review'] }).catch(() => {});
              await upsert(`## ⚠️ Assignment mismatch\n\nIssue #${issueNumber} is assigned to ${assignees.map(a => `@${a}`).join(', ')}. If this was coordinated, a mentor/maintainer can help.`);
              return;
            }

            if (quality.score >= 5) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['needs-human-review'] }).catch(() => {});
              await upsert(`## ⚠️ Manual review requested\n\nWe detected a few risk signals:\n${quality.reasons.map(r => `- ${r}`).join('\n')}\n\nNo action needed yet — a mentor/maintainer will review.`);
              return;
            }

            await upsert(`## ✅ PR validation passed\n\nThanks! Linked issue: #${issueNumber}.`);
