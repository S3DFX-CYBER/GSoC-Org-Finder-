name: Prettier Format Check

on:
  pull_request:
    branches: [main, master]

jobs:
  prettier:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Prettier check
        run: npm run format:check
