name: 🔄 Refresh Good First Issues + UI Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-good-first-issues
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@1d1121627393d3320a1197462314830db9140c2d # v4.2.0
        with:
          node-version: '22'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Prepare data directory
        run: |
          mkdir -p data
          [ -f data/issues.json ] || echo "{}" > data/issues.json
          [ -f data/mentors.json ] || echo "{}" > data/mentors.json
          [ -f data/last-updated.json ] || echo "{}" > data/last-updated.json

      - name: Fetch good first issues
        run: node agent/scripts/fetch-issues.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract mentor contacts
        run: node agent/scripts/extract-mentors.js

      - name: Validate mentor data
        run: node agent/scripts/validate-mentors.js

      - name: Generate UI cache
        run: |
          if [ -f agent/scripts/generate-ui-cache.js ]; then
            node agent/scripts/generate-ui-cache.js
          fi

      - name: Refresh organization metadata
        run: |
          if [ -f agent/scripts/refresh-org-stats.js ]; then
            node agent/scripts/refresh-org-stats.js
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure generated files exist
        run: |
          mkdir -p data
          [ -f data/ui-summary.json ] || echo '{}' > data/ui-summary.json
          [ -f data/org-stats.json ] || echo '{}' > data/org-stats.json

      - name: Update refresh timestamp
        run: |
          mkdir -p data
          echo "{\"updatedAt\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > data/last-updated.json

      - name: Update UI statistics
        run: |
          ORG_COUNT=$(node -e "const d=require('./data/issues.json'); const s=new Set(d.issues.map(i=>i.org)); console.log(s.size)")
          sed -i "s/Browse all <strong>[0-9]*<\/strong> organizations/Browse all <strong>${ORG_COUNT}<\/strong> organizations/g" index.html

      - name: Bump service worker cache version
        run: |
          if [ -f sw.js ]; then
            TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
            sed -i "s/const CACHE_NAME = '[^']*'/const CACHE_NAME = 'gsoc-finder-${TIMESTAMP}'/" sw.js
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@23f4d27f896d9510adad122d9dde1796098562d1 # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh issue dataset and UI cache"
          title: "chore: refresh good first issues + UI cache"
          signoff: true
          body: |
            ## Automated Refresh

            This PR updates:
            - good first issue dataset
            - mentor contact dataset
            - UI summary cache
            - organization metadata
            - refresh timestamps
            - service worker cache version
            - UI statistics

            Generated automatically by GitHub Actions.
          branch: automation/refresh-issues
          delete-branch: true
          add-paths: |
            data/issues.json
            data/mentors.json
            data/ui-summary.json
            data/last-updated.json
            data/org-stats.json
            index.html
            sw.js

