name: 👥 Request Reviewers

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-reviewers:
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved')

    steps:
      - name: Auto Request Reviewers (Smart)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            const isGssoc = labels.includes('gssoc26');

            // Prevent duplicate requests
            const { data: requested } = await github.rest.pulls.listRequestedReviewers({
              owner, repo, pull_number: prNumber
            });
            const alreadyRequested = (requested.users || []).map(u => u.login.toLowerCase());

            if (alreadyRequested.length >= 2) {
              console.log('Enough reviewers already requested. Skipping.');
              return;
            }

            let reviewerPool = [];

            if (isGssoc) {
              // GSSOC: Use static mentor list
              try {
                const { data: file } = await github.rest.repos.getContent({
                  owner, repo, path: '.github/reviewers/gssoc-mentors.json', ref: 'main'
                });
                const content = Buffer.from(file.content, 'base64').toString('utf8');
                reviewerPool = JSON.parse(content).reviewers || [];
              } catch (e) {
                console.log('Failed to load GSSOC mentors');
              }
            } else {
              // NSOC: Dynamic - People who have merged NSOC PRs
              console.log('Fetching NSOC experienced contributors...');
              try {
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: 'closed',
                  per_page: 100
                });

                const nsocContributors = new Set();

                for (const p of prs) {
                  if (!p.merged_at) continue;
                  const prLabels = (p.labels || []).map(l => l.name.toLowerCase());
                  if (prLabels.includes('nsoc26')) {
                    if (p.user && p.user.login) {
                      nsocContributors.add(p.user.login);
                    }
                  }
                }

                reviewerPool = Array.from(nsocContributors);
                console.log(`Found ${reviewerPool.length} NSOC experienced contributors`);
              } catch (e) {
                console.error('Failed to fetch NSOC contributors:', e.message);
              }
            }

            if (reviewerPool.length === 0) {
              console.log('No reviewers available. Skipping.');
              return;
            }

            // Remove PR author and already requested
            reviewerPool = reviewerPool.filter(reviewer =>
              reviewer.toLowerCase() !== pr.user.login.toLowerCase() &&
              !alreadyRequested.includes(reviewer.toLowerCase())
            );

            if (reviewerPool.length < 2) {
              console.log(`Not enough eligible reviewers (${reviewerPool.length}). Skipping.`);
              return;
            }

            // Shuffle and pick 2
            for (let i = reviewerPool.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [reviewerPool[i], reviewerPool[j]] = [reviewerPool[j], reviewerPool[i]];
            }

            const selected = reviewerPool.slice(0, 2);

            // Request reviewers
            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: prNumber, reviewers: selected
              });
              console.log(`Requested reviewers: ${selected.join(', ')}`);
            } catch (err) {
              console.error('Failed to request reviewers:', err.message);
            }

            // Add tracking label
            const reviewLabel = isGssoc ? 'mentor-review-requested' : 'nsoc-review-requested';
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: [reviewLabel]
              });
            } catch (e) {}
