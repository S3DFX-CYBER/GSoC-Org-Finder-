name: Request Reviewers (Stage 2)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  request:
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved') &&
      (
        contains(github.event.pull_request.labels.*.name, 'gssoc26') ||
        contains(github.event.pull_request.labels.*.name, 'nsoc') ||
        contains(github.event.pull_request.labels.*.name, 'general-oss')
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch PR reviewers and requests
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const pr = context.payload.pull_request;
            const requested = (pr.requested_reviewers || []).map(r => r.login);
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number }
            );
            const reviewers = [...new Set(reviews.map(r => r?.user?.login).filter(Boolean))];
            core.setOutput('requested', JSON.stringify(requested));
            core.setOutput('reviewers', JSON.stringify(reviewers));

      - name: Select active mentors
        id: pick
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MAX_REVIEWERS: 2
          EXISTING_REQUESTED: ${{ steps.pr_info.outputs.requested }}
          EXISTING_REVIEWERS: ${{ steps.pr_info.outputs.reviewers }}
          RECENT_MENTOR_PINGS: "[]"
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "result=$(node .github/scripts/select-active-mentors.js)" >> "$GITHUB_OUTPUT"

      - name: Request mentor reviews
        uses: actions/github-script@v7
        env:
          SELECTED: ${{ steps.pick.outputs.result }}
        with:
          script: |
            const { updateStickyComment } = require('./.github/scripts/common-utils.js');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const username = context.payload.pull_request.user.login;

            let parsed = {};
            let selected = [];

            try {
              parsed = JSON.parse(process.env.SELECTED || '{}');
              selected = Array.isArray(parsed.selected) ? parsed.selected : [];
            } catch (error) {
              core.warning(`Failed to parse SELECTED: ${error.message}`);
              return;
            }

            if (!selected.length) {
              core.info('No mentors selected, skipping review request.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: selected
              });
              
              const marker = '<!-- mentor-review-status -->';
              const newBody = [
                `## 🔍 Review Requested`, '',
                `Hi @${username}, your PR has passed Stage 1 checks!`, '',
                `The following active mentor(s) have been requested for a **Stage 2** review:`, '',
                `> ${selected.map(m => `@${m}`).join(', ')}`, '',
                `Please wait for their feedback.`
              ].join('\n');

              await updateStickyComment({ github, owner, repo, issue_number: pull_number, marker, newBody });
              core.info(`Requested mentors: ${selected.join(', ')}`);

            } catch (error) {
              core.setFailed(`requestReviewers failed: ${error.message}`);
            }
