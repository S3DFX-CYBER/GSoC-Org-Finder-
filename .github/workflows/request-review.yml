name: 👥 Request Reviewers (Stage 2)

on:
  pull_request_target:
    types: [opened, reopened, labeled, ready_for_review]

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-reviewers:
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved') &&
      !contains(github.event.pull_request.labels.*.name, 'missing-program-classification') &&
      !contains(github.event.pull_request.labels.*.name, 'invalid-program-classification')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Stage 2 - Request active mentors
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            if (!labels.includes('gssoc26')) return;

            const { data: requested } = await github.rest.pulls.listRequestedReviewers({ owner, repo, pull_number: prNumber });
            const alreadyRequested = new Set((requested.users || []).map(u => u.login.toLowerCase()));

            const out = execSync('node .github/scripts/select-active-mentors.js', { encoding: 'utf8' });
            const selected = JSON.parse(out).selected || [];
            let pool = selected
              .map(s => s.username)
              .filter(u => u.toLowerCase() !== pr.user.login.toLowerCase() && !alreadyRequested.has(u.toLowerCase()));

            if (!pool.length) return;
            pool = pool.sort(() => Math.random() - 0.5).slice(0, 2);

            const successful = [];
            for (const reviewer of pool) {
              try {
                await github.rest.pulls.requestReviewers({ owner, repo, pull_number: prNumber, reviewers: [reviewer] });
                successful.push(reviewer);
              } catch (e) {
                core.warning(`Failed reviewer ${reviewer}: ${e.message}`);
              }
            }

            if (!successful.length) return;
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['mentor-review-requested'] }).catch(() => {});

            const marker = '<!-- mentor-routing -->';
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: prNumber, per_page: 100 });
            const body = `${marker}\n## 👥 Stage 2 — Mentor Review\n\nRequested active mentors:\n${successful.map(s => `- @${s}`).join('\n')}`;
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              if (existing.body.trim() !== body.trim()) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              }
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            }
