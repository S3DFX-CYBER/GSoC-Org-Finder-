name: Update Mentor Leaderboard

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: update-mentor-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate leaderboard file
        run: node .github/scripts/generate-mentor-leaderboard.js

      - name: Post or update leaderboard on pinned issue
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const leaderboard = fs.readFileSync(
              '.github/reviewers/mentor-leaderboard.md',
              'utf8'
            );

            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const MARKER = '<!-- mentor-leaderboard-bot -->';

            const now = new Date().toUTCString();
            const body = `${MARKER}\n\n${leaderboard}\n\n---\n_Last updated: ${now}_`;

            const issues = await github.rest.issues.listForRepo({
              owner, repo,
              labels: 'mentor-leaderboard',
              state: 'open',
              per_page: 1
            });

            let issueNumber = null;

            if (issues.data.length > 0) {
              issueNumber = issues.data[0].number;
            } else {
              const created = await github.rest.issues.create({
                owner, repo,
                title: ' Mentor Leaderboard — Live Rankings',
                body: `${MARKER}\n\nThis issue tracks the live mentor leaderboard. It is updated automatically every 12 hours.\n\nThe leaderboard will appear as a comment below and is refreshed after every PR merge.`,
                labels: ['mentor-leaderboard']
              });
              issueNumber = created.data.number;
              core.info(`Created leaderboard issue #${issueNumber}`);
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: issueNumber, per_page: 100 }
            );

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && (c.body || '').includes(MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated leaderboard comment #${existing.id} on issue #${issueNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issueNumber,
                body
              });
              core.info(`Posted new leaderboard comment on issue #${issueNumber}`);
            }

      - name: Commit leaderboard file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/reviewers/mentor-leaderboard.md

          git diff --cached --quiet && echo "No leaderboard changes" && exit 0

          git commit -m "chore: update mentor leaderboard [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push
