name: 🔄 Update NSOC Reviewers List

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write

jobs:
  update-nsoc-reviewers:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'nsoc26') &&
      github.event.pull_request.user.login != github.repository_owner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add contributor to NSOC reviewers
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.github/reviewers/nsoc-reviewers.json';

            const contributor = context.payload.pull_request.user.login;

            let data;
            try {
              const content = fs.readFileSync(path, 'utf8');
              data = JSON.parse(content);
            } catch (e) {
              data = { nsoc_reviewers: [] };
            }

            if (!data.nsoc_reviewers) {
              data.nsoc_reviewers = [];
            }

            const existing = data.nsoc_reviewers.map(r => r.toLowerCase());
            if (existing.includes(contributor.toLowerCase())) {
              core.info(`${contributor} is already in the NSOC reviewers list.`);
              return;
            }

            data.nsoc_reviewers.push(contributor);
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            core.info(`Added ${contributor} to NSOC reviewers list.`);
            core.exportVariable('CONTRIBUTOR_ADDED', 'true');
            core.exportVariable('CONTRIBUTOR_NAME', contributor);

      - name: Commit and push updated reviewers list
        if: env.CONTRIBUTOR_ADDED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/reviewers/nsoc-reviewers.json
          git commit -m "chore: add ${CONTRIBUTOR_NAME} to nsoc-reviewers list"
          git push
