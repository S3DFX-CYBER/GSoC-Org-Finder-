name: 👋 Issue Welcome Bot

on:
  issues:
    types: [opened]

permissions:
  issues: write

concurrency:
  group: issue-welcome-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue || issue.pull_request || issue.user.type === 'Bot') return;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const MARKER = '<!-- issue-welcome-bot -->';

            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => (c.body || '').includes(MARKER));
            if (existing) return;

            const body = `${MARKER}
# 👋 Welcome @${username}

Thanks for opening an issue! We’ll run quick quality + duplicate checks and keep you updated.

**Want to work on an issue?** Use:
- \`/assign gssoc\`
- \`/assign nsoc\`
- \`/assign\` (general)

Please wait for assignment confirmation before starting work. Inactive assignments may be released so others can contribute.

Helpful guides:
- GSSOC: https://github.com/${owner}/${repo}/blob/main/docs/GSSOC_CONTRIBUTOR_GUIDE.md
- NSOC: https://github.com/${owner}/${repo}/blob/main/docs/NSOC_GUIDE.md
- General: https://github.com/${owner}/${repo}/blob/main/docs/GENERAL_CONTRIBUTOR_GUIDE.md

Our active mentor routing system helps keep reviews moving 🚀`;

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
