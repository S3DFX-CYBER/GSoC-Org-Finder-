<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | FindMyGSoC</title>
  <meta name="description" content="404 - Page Not Found. Return to FindMyGSoC homepage." />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
  <style>
    :root { background: #fafafa; }
    html, body { min-height: 100%; height: 100%; }
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 24px;
    }
    .notfound-card {
      max-width: 720px;
      width: 100%;
      text-align: center;
      padding: 42px 28px;
      border-radius: 24px;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .notfound-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--orange-pale);
      color: var(--orange);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 18px;
    }
    .notfound-title {
      margin: 0;
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1.02;
      letter-spacing: -.03em;
      color: var(--ink);
    }
    .notfound-copy {
      margin: 22px auto 30px;
      max-width: 520px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--ink3);
    }
    .notfound-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 20px;
      border-radius: 12px;
      background: var(--orange);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform .18s ease, background .18s ease;
    }
    .notfound-link:hover {
      transform: translateY(-1px);
      background: #d45800;
    }
  </style>
</head>
<body>
  <main class="notfound-card">
    <span class="notfound-pill">404 error</span>
    <h1 class="notfound-title">404 — Page Not Found</h1>
    <p class="notfound-copy">The page you requested doesn’t exist or has been moved. Use the button below to return to the FindMyGSoC homepage and continue browsing live organization listings.</p>
    <a class="notfound-link" href="/">Return home</a>
  </main>
</body>
</html>
