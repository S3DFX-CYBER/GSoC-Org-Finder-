<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>

  <!-- Auto redirect after 3 seconds -->
  <meta http-equiv="refresh" content="3;url=/" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #475569;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you are looking for does not exist.</p>
    <p>Redirecting you back to the homepage in 3 seconds...</p>

    <a href="/">Go Home Now →</a>
  </div>
</body>
</html>
