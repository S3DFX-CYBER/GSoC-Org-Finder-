# SonarCloud configuration for GSoC-Org-Finder
# https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/

sonar.projectKey=S3DFX-CYBER_GSoC-Org-Finder-
sonar.organization=s3dfx-cyber

# Project metadata
sonar.projectName=GSoC-Org-Finder
sonar.projectVersion=1.0

# Source directories
sonar.sources=src,api,agent/scripts

# Exclusions — node_modules, test fixtures, generated files
sonar.exclusions=**/node_modules/**,**/.github/tests/**,**/data/**,**/docs/**

# Python version (used in .github/ scripts and tests)
sonar.python.version=3.9

# JavaScript / TypeScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
